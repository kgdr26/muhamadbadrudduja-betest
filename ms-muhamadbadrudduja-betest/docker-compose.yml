version: '3'

services:

  app:
    container_name:
      ms-muhamadbadrudduja-betest

    build: .

    ports:
      - "3000:3000"

    env_file:
      - .env

    depends_on:
      - mongo
      - redis

  mongo:
    container_name:
      db_muhamadbadrudduja_betest

    image: mongo

    ports:
      - "27017:27017"

  redis:
    container_name:
      redis_muhamadbadrudduja_betest

    image: redis

    ports:
      - "6379:6379"